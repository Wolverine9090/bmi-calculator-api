
<h2 class="sr-only">BMI Calculator — enter your details to calculate your Body Mass Index</h2>

<div style="max-width: 480px; margin: 2rem auto; padding: 0 1rem;">
  <div style="background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.5rem;">
    <div style="margin-bottom: 1.5rem;">
      <p style="font-size: 22px; font-weight: 500; margin: 0 0 4px;">BMI Calculator</p>
      <p style="font-size: 14px; color: var(--color-text-secondary); margin: 0;">Enter your details to calculate your Body Mass Index</p>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px;">
      <div>
        <label style="font-size: 13px; color: var(--color-text-secondary); display: block; margin-bottom: 4px;">First name</label>
        <input type="text" id="first_name" placeholder="Satyaki" style="width: 100%; box-sizing: border-box;">
      </div>
      <div>
        <label style="font-size: 13px; color: var(--color-text-secondary); display: block; margin-bottom: 4px;">Last name</label>
        <input type="text" id="last_name" placeholder="Patra" style="width: 100%; box-sizing: border-box;">
      </div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.25rem;">
      <div>
        <label style="font-size: 13px; color: var(--color-text-secondary); display: block; margin-bottom: 4px;">Weight (kg)</label>
        <input type="number" id="weight_kg" placeholder="70" step="0.1" style="width: 100%; box-sizing: border-box;">
      </div>
      <div>
        <label style="font-size: 13px; color: var(--color-text-secondary); display: block; margin-bottom: 4px;">Height (m)</label>
        <input type="number" id="height_m" placeholder="1.75" step="0.01" style="width: 100%; box-sizing: border-box;">
      </div>
    </div>

    <button id="calcBtn" onclick="calculateBMI()" style="width: 100%; padding: 10px; font-size: 15px; cursor: pointer;">
      Calculate BMI
    </button>

    <div id="error" style="display: none; margin-top: 12px; padding: 10px 14px; background: var(--color-background-danger); border: 0.5px solid var(--color-border-danger); border-radius: var(--border-radius-md); font-size: 14px; color: var(--color-text-danger);"></div>

    <div id="result" style="display: none; margin-top: 1rem; padding: 1rem; background: var(--color-background-secondary); border-radius: var(--border-radius-md);">
      <p style="font-size: 13px; color: var(--color-text-secondary); margin: 0 0 8px;" id="result_name"></p>
      <div style="display: flex; align-items: baseline; gap: 10px; margin-bottom: 8px;">
        <span style="font-size: 36px; font-weight: 500;" id="result_bmi"></span>
        <span id="result_badge" style="font-size: 13px; font-weight: 500; padding: 3px 10px; border-radius: var(--border-radius-md);"></span>
      </div>
      <div style="height: 6px; background: var(--color-border-tertiary); border-radius: 3px; overflow: hidden;">
        <div id="result_bar" style="height: 100%; border-radius: 3px; transition: width 0.4s ease;"></div>
      </div>
      <div style="display: flex; justify-content: space-between; margin-top: 4px;">
        <span style="font-size: 11px; color: var(--color-text-tertiary);">0</span>
        <span style="font-size: 11px; color: var(--color-text-tertiary);">18.5</span>
        <span style="font-size: 11px; color: var(--color-text-tertiary);">25</span>
        <span style="font-size: 11px; color: var(--color-text-tertiary);">30</span>
        <span style="font-size: 11px; color: var(--color-text-tertiary);">40+</span>
      </div>
    </div>
  </div>
</div>

<script>
async function calculateBMI() {
  const first_name = document.getElementById('first_name').value.trim();
  const last_name = document.getElementById('last_name').value.trim();
  const weight_kg = parseFloat(document.getElementById('weight_kg').value);
  const height_m = parseFloat(document.getElementById('height_m').value);

  const errorDiv = document.getElementById('error');
  const resultDiv = document.getElementById('result');
  errorDiv.style.display = 'none';
  resultDiv.style.display = 'none';

  if (!first_name || !last_name || isNaN(weight_kg) || isNaN(height_m)) {
    errorDiv.textContent = 'Please fill in all fields correctly.';
    errorDiv.style.display = 'block';
    return;
  }

  const btn = document.getElementById('calcBtn');
  btn.textContent = 'Calculating...';
  btn.disabled = true;

  try {
    const response = await fetch('https://bmi-calculator-api-f6no.onrender.com/bmi', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ first_name, last_name, weight_kg, height_m })
    });

    const data = await response.json();

    document.getElementById('result_name').textContent = data.Name;
    document.getElementById('result_bmi').textContent = data.bmi;

    const badge = document.getElementById('result_badge');
    const bar = document.getElementById('result_bar');
    const category = data.bmi_Category;
    const bmi = data.bmi;

    const barPct = Math.min((bmi / 40) * 100, 100).toFixed(1);
    bar.style.width = barPct + '%';

    if (category === 'Underweight') {
      badge.textContent = 'Underweight';
      badge.style.background = 'var(--color-background-info)';
      badge.style.color = 'var(--color-text-info)';
      bar.style.background = '#378ADD';
    } else if (category === 'Normal') {
      badge.textContent = 'Normal';
      badge.style.background = 'var(--color-background-success)';
      badge.style.color = 'var(--color-text-success)';
      bar.style.background = '#639922';
    } else if (category === 'Overweight') {
      badge.textContent = 'Overweight';
      badge.style.background = 'var(--color-background-warning)';
      badge.style.color = 'var(--color-text-warning)';
      bar.style.background = '#EF9F27';
    } else {
      badge.textContent = 'Obese';
      badge.style.background = 'var(--color-background-danger)';
      badge.style.color = 'var(--color-text-danger)';
      bar.style.background = '#E24B4A';
    }

    resultDiv.style.display = 'block';
  } catch (err) {
    errorDiv.textContent = 'Could not connect to the API. Make sure it is running.';
    errorDiv.style.display = 'block';
  }

  btn.textContent = 'Calculate BMI';
  btn.disabled = false;
}
</script>
